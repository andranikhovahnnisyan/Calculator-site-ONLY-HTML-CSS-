<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="shortcut icon" href="calculator_fav.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="boss">
   <div class="device_div"></div> 
  <div class="calculator_div">
   <div class="input_div"></div> 
   <div class="buttons_div">
    <div class="row1">
     <button class="button1">AC</button>
     <button class="button1">DEL</button>
     <button class="button1">%</button>
     <button class="button2">/</button>   
    </div>
    <div class="row2">
     <button class="button3">7</button>
     <button class="button3">8</button>
     <button class="button3">9</button>
     <button class="button2">*</button>   
    </div>
    <div class="row3">
     <button class="button3">4</button>
     <button class="button3">5</button>
     <button class="button3">6</button>
     <button class="button2">-</button>   
    </div>
    <div class="row4">
     <button class="button3">1</button>
     <button class="button3">2</button>
     <button class="button3">3</button>
     <button class="button2">+</button>   
    </div>
    <div class="row5">
     <button class="button17">0</button>
     <button class="button3">.</button>
     <button class="button2">=</button>
    </div>
   </div> 
  </div>  
 </div>   
</body>
</html>
