<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="shortcut icon" href="calculator_fav.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="boss">
  <div class="calculator_div">
   <div class="buttons_div">
    <div class="row1">
     <button class="button1">AC</button>
     <button class="button2">DEL</button>
     <button class="button3">%</button>
     <button class="button4">/</button>   
    </div>
    <div class="row2">
     <button class="button5">7</button>
     <button class="button6">8</button>
     <button class="button7">9</button>
     <button class="button8">*</button>   
   
    </div>
    <div class="row3">
     <button class="button9">4</button>
     <button class="button10">5</button>
     <button class="button11">6</button>
     <button class="button12">-</button>   

    </div>
    <div class="row4">
     <button class="button13">1</button>
     <button class="button14">2</button>
     <button class="button15">3</button>
     <button class="button16">+</button>   
    </div>
    <div class="row5">
     <button class="button17">0</button>
     <button class="button18">.</button>
     <button class="button19">=</button>
    </div>
   </div> 
  </div>  
 </div>   
</body>
</html>
